services:
  postgres:
    image: postgres:17-alpine
    container_name: telos-postgres
    environment:
      POSTGRES_USER: telos
      POSTGRES_PASSWORD: telos_dev
      POSTGRES_DB: telos
    ports:
      - "5433:5432"
    volumes:
      - telos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: telos-redis
    ports:
      - "6380:6379"
    volumes:
      - telos_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  telos_pgdata:
  telos_redisdata:
