<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0f10" />
    <meta name="description" content="Telos — training programmed around your goal." />
    <title>Telos</title>
    <script>
      // Theme boot: set data-theme before React mounts to avoid a flash.
      // 3-state preference (system/light/dark) in localStorage['telos-theme'];
      // dark is the default when the system expresses no light preference.
      (function () {
        try {
          var pref = localStorage.getItem("telos-theme") || "system";
          var light =
            pref === "light" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.setAttribute("data-theme", light ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
